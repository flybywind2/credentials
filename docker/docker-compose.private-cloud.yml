services:
  credential-app:
    image: credential-classification:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env.private-cloud
    environment:
      SMTP_MODE: smtp
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
