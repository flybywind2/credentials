apiVersion: apps/v1
kind: Deployment
metadata:
  name: credential-app
  namespace: credential
  labels:
    app.kubernetes.io/name: credential-classification
    app.kubernetes.io/component: web
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: credential-classification
      app.kubernetes.io/component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: credential-classification
        app.kubernetes.io/component: web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: credential-app
          image: credential-classification:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: credential-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: credential-secrets
                  key: DATABASE_URL
                  optional: true
            - name: SSO_PROVIDER_URL
              valueFrom:
                secretKeyRef:
                  name: credential-secrets
                  key: SSO_PROVIDER_URL
                  optional: true
            - name: SSO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: credential-secrets
                  key: SSO_CLIENT_ID
                  optional: true
            - name: SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: credential-secrets
                  key: SSO_CLIENT_SECRET
                  optional: true
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: credential-secrets
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: credential-secrets
                  key: SMTP_USERNAME
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: credential-secrets
                  key: SMTP_PASSWORD
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
